name: busbin
description: A production-ready self-contained MVP demo for BusBin.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    # Declares the local logo.jpg asset located in the root of the project directory.
    # To place it in an assets folder, move the image to "assets/logo.jpg" and change this to "assets/logo.jpg".
    - logo.jpg
